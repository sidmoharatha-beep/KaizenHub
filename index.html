<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OORJA 2.0 — KaizenHub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/css/styles.css"/>
<script type="importmap">
{"imports":{"/js/app.js":"./js/app.js","/js/auth.js":"./js/auth.js"}}
</script>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- RESET MODAL -->
<div class="modal-overlay" id="reset-modal">
  <div class="modal">
    <h3>Reset Password</h3>
    <p id="reset-modal-name" style="font-size:13px;color:var(--text-muted);margin-bottom:16px"></p>
    <div class="form-row"><label>New Password</label><input type="text" id="reset-new-pass" placeholder="Min 8 chars"/></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeResetModal()">Cancel</button>
      <button class="btn-confirm" onclick="confirmReset()">Reset</button>
    </div>
  </div>
</div>

<!-- DELETE MODAL -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <h3>Delete User</h3>
    <p id="delete-modal-name" style="font-size:13px;color:var(--text-muted);margin-bottom:16px"></p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn-confirm" style="background:linear-gradient(135deg,#DC2626,#991B1B)" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <!-- Left Panel — Branding -->
  <div class="auth-panel-left">
    <div class="hex-pattern">
      <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M100 10L173.205 55V145L100 190L26.795 145V55L100 10Z" stroke="white" stroke-width="1.5"/>
        <path d="M100 36L147.387 66.5V115.5L100 146L52.613 115.5V66.5L100 36Z" stroke="white" stroke-width="1.2"/>
        <path d="M100 62L121.26 76V100L100 114L78.74 100V76L100 62Z" stroke="white" stroke-width="1"/>
      </svg>
    </div>
    <div class="auth-brand">
      <div class="auth-wordmark">OOR<span>JA</span></div>
      <div class="auth-tagline">KaizenHub — Continuous Improvement Portal</div>
    </div>
  </div>

  <!-- Right Panel — Login Form -->
  <div class="auth-panel-right">
    <div class="auth-form-container">
      <div class="auth-form-header">
        <h2>Welcome back</h2>
        <p>Sign in to your OORJA 2.0 workspace</p>
      </div>
      <div class="auth-card">
        <div class="fg">
          <label>Email Address</label>
          <input type="email" id="login-email" placeholder="you@company.com" autocomplete="username"/>
        </div>
        <div class="fg">
          <label>Password</label>
          <input type="password" id="login-pass" placeholder="Enter your password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/>
        </div>
        <button class="btn-primary" id="login-btn">Sign In →</button>
        <div class="auth-err" id="login-err"></div>
      </div>
      <div class="auth-footer">
        OORJA 2.0 · Powered by Cloudflare Pages + D1
      </div>
    </div>
  </div>
</div>

<!-- APP SHELL -->
<div id="app" style="display:none">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-logo">
        <!-- Factory/Lightning bolt icon -->
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="white" stroke="white" stroke-width="0.5" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="topbar-title">OOR<span>JA</span> 2.0</div>
    </div>
    <div class="topbar-user">
      <div class="user-chip">
        <div class="user-avatar" id="user-avatar">—</div>
        <div class="user-info">
          <span class="user-name" id="user-name">Loading...</span>
          <span class="user-role" id="user-role-label">—</span>
        </div>
      </div>
      <span class="role-pill" id="role-pill">—</span>
      <button class="btn-logout" onclick="doLogout()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sign out
      </button>
    </div>
  </div>

  <div class="page active" id="page-home">
    <div id="home-content"><div class="loading">Loading dashboard...</div></div>
  </div>

  <div class="page" id="page-submit">
    <div id="submit-content"><div class="loading">Loading...</div></div>
  </div>

  <div class="page" id="page-review">
    <div id="review-content"><div class="loading">Loading...</div></div>
  </div>

  <div class="page" id="page-rewards">
    <div id="reward-content"><div class="loading">Loading...</div></div>
  </div>

  <div class="page" id="page-leaderboard">
    <div id="leaderboard-content"><div class="loading">Loading...</div></div>
  </div>

  <div class="page" id="page-admin">
    <div id="admin-content"><div class="loading">Loading...</div></div>
  </div>

  <div class="page" id="page-learning">
    <div id="learning-content"><div class="loading">Loading...</div></div>
  </div>

  <div class="bottom-nav" id="bottom-nav"></div>
</div>

<script type="module">
import { doLogin, doLogout, loadApp, initAuth } from './js/auth.js';
window.doLogin = doLogin; window.doLogout = doLogout; window.loadApp = loadApp;

import { showPage } from './js/app.js';
window.showPage = showPage;

initAuth();
</script>
</body>
</html>
